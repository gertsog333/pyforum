# =============================================================================
# docker/docker-compose.yml — PyForum Docker stack
#
# Сервисы (порядок запуска):
#   1. vault      — HashiCorp Vault dev mode
#   2. db         — PostgreSQL 13
#   3. vault-init — записывает секреты в Vault один раз, затем выходит
#   4. app        — Django + Gunicorn (читает секреты из Vault при старте)
#   5. nginx      — reverse proxy, SSL termination, отдаёт статику напрямую
#
# Запуск из папки docker/:
#   docker compose --env-file .env.docker up --build
#
# Порты на хосте:
#   80   — HTTP (redirect на HTTPS)
#   443  — HTTPS (приложение)
#   8200 — Vault UI (http://localhost:8200, token: root)
# =============================================================================

volumes:
  pyforum_postgres:
  pyforum_media:
  pyforum_static:

services:

  # ---------------------------------------------------------------------------
  # Vault — HashiCorp Vault в dev mode
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    container_name: pyforum_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # PostgreSQL 13
  # ---------------------------------------------------------------------------
  db:
    image: postgres:13
    container_name: pyforum_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pyforum_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Vault Init — записывает секреты в Vault один раз, затем выходит (restart: no)
  # ---------------------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:latest
    container_name: pyforum_vault_init
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_DB_NAME: ${VAULT_DB_NAME}
      VAULT_DB_USER: ${VAULT_DB_USER}
      VAULT_DB_PASSWORD: ${VAULT_DB_PASSWORD}
      VAULT_SECRET_KEY: ${VAULT_SECRET_KEY}
      VAULT_PGADMIN_EMAIL: ${VAULT_PGADMIN_EMAIL}
      VAULT_PGADMIN_PASSWORD: ${VAULT_PGADMIN_PASSWORD}
      VAULT_EMAIL_HOST_USER: ${VAULT_EMAIL_HOST_USER}
      VAULT_EMAIL_HOST_PASSWORD: ${VAULT_EMAIL_HOST_PASSWORD}
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
    command: ["sh", "/vault-init.sh"]
    depends_on:
      vault:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # App — Django + Gunicorn
  #   Секреты читаются из Vault в entrypoint.sh при старте контейнера.
  #   Статика копируется из /app/staticfiles_src/ в shared volume /staticfiles/.
  #   Порт 8000 доступен ТОЛЬКО внутри Docker network (nginx → app:8000).
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pyforum_app
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      DB_HOST: db
      DB_PORT: "5432"
      STATIC_ROOT: /staticfiles
      CORS_ORIGIN_WHITELIST: ${CORS_ORIGIN_WHITELIST}
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
    volumes:
      - pyforum_static:/staticfiles
      - pyforum_media:/app/media
    depends_on:
      vault:
        condition: service_healthy
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(3); s.connect((\"localhost\",8000)); s.close()' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + SSL termination + отдача статики
  #   :80  → redirect на HTTPS
  #   :443 → proxy_pass app:8000 для Django, /static/* из shared volume
  #   Self-signed сертификат генерируется при первом старте контейнера.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: pyforum_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.entrypoint.sh:/nginx.entrypoint.sh:ro
      - pyforum_static:/staticfiles:ro
      - pyforum_media:/media:ro
    entrypoint: ["sh", "/nginx.entrypoint.sh"]
    depends_on:
      app:
        condition: service_healthy
