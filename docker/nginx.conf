# =============================================================================
# docker/nginx.conf — Nginx reverse proxy for PyForum
#
# Схема:
#   :80  → 301 redirect → https
#   :443 → SSL termination
#          /static/* → /staticfiles/ (shared volume, без Django)
#          /media/*  → /media/       (shared volume, без Django)
#          /*        → proxy_pass app:8000 (Gunicorn)
#
# SSL сертификат генерируется при старте контейнера в nginx.entrypoint.sh
# =============================================================================

upstream django_app {
    server app:8000;
}

# ---------------------------------------------------------------------------
# HTTP — redirect всего на HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS — основной сервер
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Максимальный размер тела запроса (для загрузки файлов)
    client_max_body_size 20M;

    # Таймауты
    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ------------------------------------------------------------------
    # Статические файлы — Nginx отдаёт напрямую из shared volume
    # Обходит Gunicorn/Whitenoise полностью → максимальная скорость
    # ------------------------------------------------------------------
    location /static/ {
        alias   /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Медиафайлы — загруженные пользователями
    # ------------------------------------------------------------------
    location /media/ {
        alias   /media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Всё остальное → Django через Gunicorn
    # ------------------------------------------------------------------
    location / {
        proxy_pass         http://django_app;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_redirect     off;

        # Буферизация ответов от Gunicorn
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }
}
