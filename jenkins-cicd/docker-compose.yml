# =============================================================================
# jenkins-cicd/docker-compose.yml — Jenkins CI/CD stack
#
# Services:
#   jenkins-master  — Jenkins LTS controller (UI, credentials, job scheduling)
#   jenkins-agent   — Custom SSH agent (runs pipeline: checkout, test, deploy)
#
# Master -> Agent connection: SSH on Docker network (host: jenkins-agent, port: 22)
# Agent  -> pyforum-docker-host: SSH via mounted deploy key (192.168.56.50)
#
# Required .env.jenkins (generated by provision.sh):
#   JENKINS_AGENT_SSH_PUBKEY — RSA/ED25519 public key for master->agent SSH
#
# Usage:
#   docker compose --env-file .env.jenkins up -d --build
# =============================================================================

volumes:
  jenkins_home:

services:

  # ---------------------------------------------------------------------------
  # Jenkins Master (Controller)
  #   - Web UI on port 8080
  #   - Agent JNLP/SSH port 50000 (exposed for future agents)
  #   - State persisted in jenkins_home volume
  # ---------------------------------------------------------------------------
  jenkins-master:
    image: jenkins/jenkins:lts
    container_name: pyforum_jenkins_master
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jenkins Agent (SSH)
  #   Base: jenkins/ssh-agent — accepts SSH from master via JENKINS_AGENT_SSH_PUBKEY
  #   Added tools: python3, pip, git, openssh-client (see agent/Dockerfile)
  #   Deploy key mounted read-only for SSH access to pyforum-docker-host
  # ---------------------------------------------------------------------------
  jenkins-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: pyforum_jenkins_agent
    environment:
      JENKINS_AGENT_SSH_PUBKEY: ${JENKINS_AGENT_SSH_PUBKEY}
    volumes:
      - /home/vagrant/.ssh/jenkins_deploy:/home/jenkins/.ssh/id_ed25519:ro
    restart: unless-stopped
    depends_on:
      - jenkins-master
